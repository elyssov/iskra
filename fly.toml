app = "iskra-relay"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile.relay"

[env]
  PORT = "8443"

[http_service]
  internal_port = 8443
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 2500
    soft_limit = 2000

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
